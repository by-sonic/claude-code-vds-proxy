name: Bug report
description: Report a reproducible installer, tunnel, audit, or verification problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a problem. Remove IP addresses, usernames, tokens, key paths, and private logs before submitting.
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.5"
    validations:
      required: true
  - type: input
    id: vds
    attributes:
      label: VDS distribution
      placeholder: "Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: claude
    attributes:
      label: Claude Code version and install method
      placeholder: "2.x, native"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the command and redacted output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, personal data, real IP addresses, and private key paths.
          required: true
