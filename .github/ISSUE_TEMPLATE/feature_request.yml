name: Feature request
description: Suggest an improvement to installation, routing, auditing, or documentation
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Explain expected behavior and security implications.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - macOS installer
        - VDS / Squid
        - Verification and audits
        - Update lifecycle
        - Documentation
    validations:
      required: true
