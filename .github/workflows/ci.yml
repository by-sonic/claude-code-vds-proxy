name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    name: Bash and ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run static checks
        run: ./tests/static.sh
